<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪲 獨角仙飼育師</title>
  <meta name="description" content="獨角仙幼蟲飼育模擬遊戲 — 學習正確的環境管理決策">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD overlay -->
    <div id="hud">
      <div id="hud-top">
        <span id="day-counter">第 1 天</span>
        <div class="stage-container">
          <img src="pic/8QvXM1ODOx.png" alt="幼蟲" id="hud-larva-img" class="hud-larva-img">
          <span id="stage-badge">🐛 一齡幼蟲</span>
        </div>
        <span id="hud-hour">06:00</span>
      </div>
      <div id="hud-stats">
        <div class="stat-bar">
          <label>🌡️ 溫度</label>
          <div class="bar-track">
            <div class="bar-fill temp-fill" id="bar-temp"></div>
          </div>
          <span class="stat-val" id="val-temp">24°</span>
        </div>
        <div class="stat-bar">
          <label>💧 濕度</label>
          <div class="bar-track">
            <div class="bar-fill moisture-fill" id="bar-moisture"></div>
          </div>
          <span class="stat-val" id="val-moisture">50</span>
        </div>
        <div class="stat-bar">
          <label>🍂 底材</label>
          <div class="bar-track">
            <div class="bar-fill substrate-fill" id="bar-substrate"></div>
          </div>
          <span class="stat-val" id="val-substrate">80</span>
        </div>
        <div class="stat-bar">
          <label>🦠 病蟲害</label>
          <div class="bar-track">
            <div class="bar-fill pest-fill" id="bar-pest"></div>
          </div>
          <span class="stat-val" id="val-pest">5</span>
        </div>
      </div>
      <!-- 健康值 -->
      <div id="hud-health">
        <div class="stat-bar health-bar-row">
          <label>❤️ 健康</label>
          <div class="bar-track bar-track-lg">
            <div class="bar-fill health-fill" id="bar-health"></div>
          </div>
          <span class="stat-val" id="val-health">100</span>
        </div>
      </div>
      <!-- 蛹室 -->
      <div id="hud-pupa" class="hidden">
        <div class="stat-bar">
          <label>🏠 蛹室</label>
          <div class="bar-track">
            <div class="bar-fill pupa-fill" id="bar-pupa"></div>
          </div>
          <span class="stat-val" id="val-pupa">0</span>
        </div>
        <div id="pupa-warning" class="pupa-warning"></div>
      </div>
      <div id="hud-bottom">
        <span id="photo-count">📷 0/6</span>
        <span id="growth-bar-label">📈 成長</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div id="action-buttons">
      <button class="action-btn" id="btn-spray" title="噴水補濕：濕度+10%">
        <span class="btn-icon">💦</span>
        <span class="btn-text">噴水</span>
        <span class="btn-cd" id="cd-spray"></span>
      </button>
      <button class="action-btn" id="btn-ventilate" title="通風換氣：溫度-2°C、濕度-5%">
        <span class="btn-icon">🌬️</span>
        <span class="btn-text">通風</span>
        <span class="btn-cd" id="cd-ventilate"></span>
      </button>
      <button class="action-btn" id="btn-substrate" title="換新底材：底材+50%、病蟲害-20%">
        <span class="btn-icon">🍂</span>
        <span class="btn-text">換底材</span>
        <span class="btn-cd" id="cd-substrate"></span>
      </button>
      <button class="action-btn" id="btn-inspect" title="翻土觀察：查看幼蟲狀態（有副作用）">
        <span class="btn-icon">🔍</span>
        <span class="btn-text">翻土</span>
        <span class="btn-cd" id="cd-inspect"></span>
      </button>
      <button class="action-btn" id="btn-clean" title="清除糞便：底材+15%">
        <span class="btn-icon">🧹</span>
        <span class="btn-text">清糞</span>
        <span class="btn-cd" id="cd-clean"></span>
      </button>
      <button class="action-btn" id="btn-cool" title="降溫處理：溫度-5°C">
        <span class="btn-icon">❄️</span>
        <span class="btn-text">降溫</span>
        <span class="btn-cd" id="cd-cool"></span>
      </button>
      <button class="action-btn" id="btn-pest" title="除蟲處理：病蟲害-30%">
        <span class="btn-icon">🏥</span>
        <span class="btn-text">除蟲</span>
        <span class="btn-cd" id="cd-pest"></span>
      </button>
      <button class="action-btn hidden" id="btn-chamber" title="製作人工蛹室（蛹期限定）">
        <span class="btn-icon">🏠</span>
        <span class="btn-text">蛹室</span>
      </button>
      <button class="action-btn" id="btn-photo" title="拍照記錄">
        <span class="btn-icon">📷</span>
        <span class="btn-text">拍照</span>
        <span class="btn-cd" id="cd-photo"></span>
      </button>
      <button class="action-btn" id="btn-speed" title="調整時間速度">
        <span class="btn-icon">⏩</span>
        <span class="btn-text">1x</span>
      </button>
    </div>

    <!-- Title screen overlay -->
    <div id="title-screen" class="overlay">
      <div class="title-content">
        <h1 class="title-main">🪲 獨角仙飼育師</h1>
        <h2 class="title-sub">カブトムシ飼育シミュレーション</h2>
        <p class="title-desc">扮演甲蟲飼育師，從一顆卵開始<br>透過正確的環境管理，將獨角仙養育至成蟲羽化！</p>
        <button id="btn-start" class="start-btn">▶ 開始飼育</button>
        <div class="title-tips">
          <p>🌡️ 溫度 ｜ 💧 濕度 ｜ 🍂 底材 ｜ 🦠 病蟲害</p>
          <p>💦 噴水 ｜ 🌬️ 通風 ｜ 🍂 換底材 ｜ 🔍 翻土 ｜ 🧹 清糞 ｜ ❄️ 降溫 ｜ 🏥 除蟲</p>
          <p>⚠️ 隨機事件！正確的飼育決策才能讓幼蟲健康成長</p>
        </div>
        <button id="btn-settings" class="settings-link">⚙️ Google Sheets 設定</button>
      </div>
    </div>

    <!-- Growth notification -->
    <div id="growth-notify" class="overlay hidden">
      <div class="growth-content">
        <h2 id="growth-title">🎉 成長!</h2>
        <img id="growth-image" class="growth-image hidden" src="">
        <p id="growth-desc"></p>
        <button id="btn-growth-ok" class="start-btn">繼續</button>
      </div>
    </div>

    <!-- Random Event Choice dialog -->
    <div id="event-choice" class="overlay hidden">
      <div class="event-content">
        <h2 id="event-title">⚠️ 事件</h2>
        <p id="event-desc"></p>
        <div class="event-buttons">
          <button id="btn-event-a" class="event-btn correct">選項 A</button>
          <button id="btn-event-b" class="event-btn wrong">選項 B</button>
        </div>
        <p id="event-result" class="event-result hidden"></p>
        <button id="btn-event-ok" class="start-btn hidden">繼續</button>
      </div>
    </div>

    <!-- Diary panel -->
    <div id="diary-panel" class="hidden">
      <div class="diary-header">
        <h2>📖 成長日記</h2>
        <button id="btn-diary-close" class="diary-close">✕</button>
      </div>
      <div id="diary-entries" class="diary-grid"></div>
    </div>

    <!-- Ending screen -->
    <div id="ending-screen" class="overlay hidden">
      <div class="ending-content">
        <h1 id="ending-title"></h1>
        <div id="ending-beetle">
          <img src="pic/2ZKrpVsOas.png" alt="成蟲" class="ending-adult-img">
        </div>
        <div id="ending-stats"></div>
        <div id="ending-rank"></div>
        <button id="btn-diary-view" class="start-btn">📖 查看日記</button>
        <button id="btn-restart" class="start-btn secondary">🔄 重新開始</button>
      </div>
    </div>

    <!-- Interaction feedback -->
    <div id="interact-feedback" class="hidden"></div>

    <!-- Knowledge card toast -->
    <div id="knowledge-toast" class="knowledge-toast hidden"></div>

    <!-- Settings panel -->
    <div id="settings-panel" class="overlay hidden">
      <div class="settings-content">
        <h2>⚙️ Google Sheets 設定</h2>
        <p class="settings-desc">輸入 GAS 部署網址，遊戲結束時自動儲存飼養紀錄</p>
        <div class="settings-field">
          <label>👤 飼育員名稱</label>
          <input type="text" id="input-player" placeholder="你的名字" maxlength="20">
        </div>
        <div class="settings-field">
          <label>🔗 GAS 網址</label>
          <input type="url" id="input-endpoint" placeholder="https://script.google.com/macros/s/...">
        </div>
        <div class="settings-buttons">
          <button id="btn-settings-save" class="start-btn">儲存</button>
          <button id="btn-settings-close" class="start-btn secondary">取消</button>
        </div>
        <div id="settings-status" class="settings-status"></div>
      </div>
    </div>

    <!-- Cloud save toast -->
    <div id="cloud-toast" class="cloud-toast hidden"></div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/beetle.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
